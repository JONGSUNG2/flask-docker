<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">

<div class="container my-3">
    <table class="table">
        <thead>
        <tr class="table-dark">
            <th>번호</th>
            <th>제목</th>
            <th>작성일시</th>
        </tr>
        </thead>
        <tbody>
        {% if question_list %}
        {% for question in question_list %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>
                <a href="{{ url_for('question.detail', question_id=question.id) }}">{{ question.subject }}</a>
            </td>
            <td>{{ question.create_date }}</td>
        </tr>
        {% endfor %}
        {% else %}
        <tr>
            <td colspan="3">질문이 없습니다.</td>
        </tr>
        {% endif %}
        </tbody>
    </table>

</div>

<form action="{{ url_for('question.create') }}" method="post" class="my-3">

    <div class="mb-3">
        <label for="subject" class="form-label">제목</label>
        <input
            type="text"
            name="subject"
            id="subject"
            class="form-control"
            placeholder="제목을 입력하세요">
    </div>

    <div class="mb-3">
        <label for="content" class="form-label">내용</label>
        <textarea
            name="content"
            id="content"
            class="form-control"
            rows="10"></textarea>
    </div>

    <input type="submit" value="질문등록" class="btn btn-primary">
</form>

</body>
</html>
